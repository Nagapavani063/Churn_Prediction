<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #aaa; }
        h2 { text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; margin-top: 20px; border: none; border-radius: 5px; background: #007BFF; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { text-align: center; margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Telecom Churn Prediction</h2>
        <form method="POST" action="/">
            <label>Monthly Charges</label>
            <input type="number" step="0.01" name="MonthlyCharges" required>

            <label>Total Charges</label>
            <input type="number" step="0.01" name="TotalCharges" required>

            <label>Tenure (months)</label>
            <input type="number" name="tenure" required>

            <label>Gender (0=Female,1=Male)</label>
            <input type="number" min="0" max="1" name="gender" required>

            <label>Partner (0=No,1=Yes)</label>
            <input type="number" min="0" max="1" name="Partner" required>

            <label>Dependents (0=No,1=Yes)</label>
            <input type="number" min="0" max="1" name="Dependents" required>

            <label>Phone Service (0=No,1=Yes)</label>
            <input type="number" min="0" max="1" name="PhoneService" required>

            <label>Paperless Billing (0=No,1=Yes)</label>
            <input type="number" min="0" max="1" name="PaperlessBilling" required>

            <label>Multiple Lines</label>
            <select name="MultipleLines" required>
                <option value="">Select</option>
                <option value="No phone service">No phone service</option>
                <option value="Yes">Yes</option>
            </select>

            <label>Internet Service</label>
            <select name="InternetService" required>
                <option value="">Select</option>
                <option value="DSL">DSL</option>
                <option value="Fiber optic">Fiber optic</option>
                <option value="No">No</option>
            </select>

            <label>Online Security</label>
            <select name="OnlineSecurity" required>
                <option value="">Select</option>
                <option value="No internet service">No internet service</option>
                <option value="Yes">Yes</option>
            </select>

            <label>Online Backup</label>
            <select name="OnlineBackup" required>
                <option value="">Select</option>
                <option value="No internet service">No internet service</option>
                <option value="Yes">Yes</option>
            </select>

            <label>Device Protection</label>
            <select name="DeviceProtection" required>
                <option value="">Select</option>
                <option value="No internet service">No internet service</option>
                <option value="Yes">Yes</option>
            </select>

            <label>Tech Support</label>
            <select name="TechSupport" required>
                <option value="">Select</option>
                <option value="No internet service">No internet service</option>
                <option value="Yes">Yes</option>
            </select>

            <label>SIM Provider</label>
            <select name="SIM_provider" required>
                <option value="">Select Provider</option>
                <option value="Jio">Jio</option>
                <option value="Airtel">Airtel</option>
                <option value="Vodafone">Vodafone</option>
                <option value="BSNL">BSNL</option>
            </select>

            <button type="submit">Predict</button>
        </form>

        {% if result %}
        <div class="result">{{ result }}</div>
        {% endif %}
    </div>
</body>
</html>
